  <script>
    const pageFlip = new St.PageFlip(document.getElementById("book"), {
      width: 400,
      height: 410,
      maxWidth: 600,
      maxHeight: 650,
      size: "fixed",
      showCover: false,
      useMouseEvents: false, // disables page curl
      flippingTime: 400,
      drawShadow: false,
      mobileScrollSupport: true
    });

    pageFlip.loadFromHTML(document.querySelectorAll(".page"));

    document.getElementById("next").addEventListener("click", () => {
      pageFlip.flipNext();
    });

    document.getElementById("prev").addEventListener("click", () => {
      pageFlip.flipPrev();
    });
	
    document.getElementById("start").addEventListener("click", () => {
      pageFlip.flip(0);
    });

    document.getElementById("end").addEventListener("click", () => {
      const lastPage = pageFlip.getPageCount() - 1;
      pageFlip.flip(lastPage);
    });
	
	// Arrow keys
    document.addEventListener("keydown", (event) => {
      switch (event.key) {
        case "ArrowRight": // Right arrow → next page
          pageFlip.flipNext();
          break;
        case "ArrowLeft": // Left arrow → previous page
          pageFlip.flipPrev();
          break;
        case "Home":       // Home → first page
          pageFlip.flip(0);
          event.preventDefault();
          break;
        case "End":        // End → last page
          const lastPage = pageFlip.getPageCount() - 1;
          pageFlip.flip(lastPage);
          event.preventDefault();
          break;		  
      }
    });	
	
	function updatePageInfo() {
      const current = pageFlip.getCurrentPageIndex() + 1;
      const total = pageFlip.getPageCount();
      document.getElementById("pageInfo").textContent =
        `Page ${current} of ${total}`;
    }

    pageFlip.on("flip", updatePageInfo);
    updatePageInfo();
	
	document.getElementById("goPage").addEventListener("click", () => {
      const page = parseInt(document.getElementById("pageInput").value);
      const total = pageFlip.getPageCount();
      if (page >= 1 && page <= total) {
        pageFlip.flip(page - 1);
      }
    });
	
  </script>
